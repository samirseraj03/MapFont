<ion-content [fullscreen]="true" class="custom-bg">

  <input id="fileItem" type="file" style="display: none" (change)="handleFileInput($event)" accept="image/*" />

  <div class="overlay"></div>

  <header class="glass-header">
    <div class="header-left">
      <button class="back-btn" (click)="GeolocationService.GoBack(NavCtrl)">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>
      <h1>{{ 'new_fountain' | translate }}</h1>
    </div>
    <div class="step-indicator">STEP 2</div>
  </header>

  <main class="main-content">

    <div class="text-center">
      <h2>{{ 'upload_font_photo' | translate }}</h2>
      <p>{{ 'have_you_seen_a_font_and_want_to_contribute_to_mapfont' | translate }}</p>
    </div>

    <div class="image-preview-box" (click)="SelectInput()">
      <div class="placeholder-content" *ngIf="!Service.img_ref">
        <div class="icon-circle">
          <ion-icon name="camera-outline"></ion-icon>
        </div>
        <p>PREVISUALIZACIÓN DE IMAGEN</p>
        <div class="dashed-border"></div>
      </div>
      <img *ngIf="Service.img_ref" [src]="Service.img_ref" class="uploaded-image" alt="Fuente previsualización" />
    </div>

    <div class="action-buttons">

      <button class="btn-primary" *ngIf="!Service.img_ref" (click)="SelectInput()">
        <ion-icon name="cloud-upload-outline"></ion-icon>
        {{ 'upload_photo' | translate }}
      </button>

      <button class="btn-primary" *ngIf="Service.img_ref" (click)="ImageSuccess()">
        {{ 'next_step' | translate }}
        <ion-icon name="arrow-forward-outline"></ion-icon>
      </button>

      <button class="btn-delete" *ngIf="Service.img_ref" (click)="Delete()">
        <ion-icon name="trash-outline"></ion-icon>
        {{ 'delete_photo' | translate }}
      </button>

    </div>
  </main>

</ion-content>
