<!-- CONFIGRUACION OBSOLETA -->


<ion-menu menuId="main-content" contentId="main-content" side="start" content-id="main-content" root="rootMenu">
  <ion-toolbar color="tertiary">
    <ion-title>{{ 'menu' | translate }}</ion-title>
  </ion-toolbar>
  <ion-content id="content">
    <ion-list lines="none" class="ion-margin ion-padding ion-justify-content-between">
      <ion-item (click)="navigateTo('formularios')" class="ion-no-margin">
        <ion-button expand="full" fill="clear">{{ 'my_forms' | translate }}</ion-button>
      </ion-item>
      <ion-item (click)="navigateTo('configuracion')" class="ion-no-margin">
        <ion-button expand="full" fill="clear">{{ 'configuration' | translate }}</ion-button>
      </ion-item>
      <ion-item (click)="navigateTo('seguridad')" class="ion-no-margin">
        <ion-button expand="full" fill="clear">{{ 'security' | translate }}</ion-button>
      </ion-item>
      <ion-item (click)="navigateTo('donaciones')" class="ion-no-margin">
        <ion-button expand="full" fill="clear">{{ 'donations' | translate }}</ion-button>
      </ion-item>
      <ion-item (click)="navigateTo('guardados')" class="ion-no-margin">
        <ion-button expand="full" fill="clear">{{ 'saved' | translate }}</ion-button>
      </ion-item>
      <ion-item (click)="navigateTo('Confirmacion')" class="ion-no-margin">
        <ion-button expand="full" fill="clear">{{ 'confirmation' | translate }}</ion-button>
      </ion-item>
      <ion-item (click)="navigateTo('CerrarSession')" class="ion-no-margin">
        <ion-button expand="full" fill="clear">{{ 'logout' | translate }}</ion-button>
      </ion-item>
    </ion-list>
  </ion-content>

</ion-menu>

<ion-router-outlet id="main-content"></ion-router-outlet>
