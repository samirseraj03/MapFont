<ion-content [fullscreen]="true" class="custom-bg">

  <div class="overlay"></div>

  <header class="glass-header">
    <div class="header-left">
      <button class="back-btn" (click)="NavCtrl.back()">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>
      <h1>{{ 'security_title' | translate }}</h1>
    </div>
  </header>

  <main class="main-content">

    <div class="illustration-container">
      <div class="shield-glow"></div>
      <div class="icon-shield-wrapper">
        <ion-icon name="shield-checkmark-outline"></ion-icon>
      </div>
      <p class="subtitle">{{ 'change_password_subtitle' | translate }}</p>
    </div>

    <section class="glass-panel">
      <form>

        <div class="form-group">
          <label>{{ 'current_password' | translate }}</label>
          <div class="input-wrapper">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <ion-input type="password" placeholder="••••••••" name="OldPassword" [(ngModel)]="OldPassword" required>
            </ion-input>
          </div>
        </div>

        <div class="form-group mt-4">
          <label>{{ 'new_password' | translate }}</label>
          <div class="input-wrapper">
            <ion-icon name="key-outline"></ion-icon>
            <ion-input type="password" placeholder="••••••••" name="NewPassword" [(ngModel)]="NewPassword" required>
            </ion-input>
          </div>
        </div>

        <div class="form-group">
          <label>{{ 'confirm_new_password_label' | translate }}</label>
          <div class="input-wrapper">
            <ion-icon name="checkmark-done-outline"></ion-icon>
            <ion-input type="password" placeholder="••••••••" name="NewConfirmPassword" [(ngModel)]="NewConfirmPassword"
              required>
            </ion-input>
          </div>
        </div>

      </form>
    </section>

    <div class="action-section">
      <button class="submit-btn" (click)="Update()">
        <ion-icon name="save-outline"></ion-icon>
        {{ 'save' | translate }}
      </button>
    </div>

  </main>
</ion-content>
