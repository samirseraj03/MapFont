<ion-content [fullscreen]="true" class="custom-bg">

  <div class="overlay"></div>

  <header class="glass-header">
    <div class="header-left">
      <button class="back-btn" (click)="NavCtrl.back()">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>
      <h1>{{ 'donation_title' | translate }}</h1>
    </div>
    <div class="header-right">
      <ion-icon name="heart-outline" class="title-icon"></ion-icon>
    </div>
  </header>

  <main class="main-content">

    <!-- Hero -->
    <section class="glass-panel hero-section">
      <div class="paypal-glow"></div>
      <div class="paypal-logo-wrap">
        <img src="https://freepngimg.com/thumb/paypal/2-2-paypal-logo-transparent-png.png" alt="PayPal" />
      </div>
      <h2>{{ 'support_mapfont' | translate }}</h2>
      <p>{{ 'donation_subtitle' | translate }}</p>
    </section>

    <!-- QR Code -->
    <section class="glass-panel qr-section">
      <div class="qr-frame">
        <div class="qr-white-bg">
          <img src="assets/icon/qrcode.png" alt="QR PayPal" />
        </div>
      </div>
      <div class="qr-info">
        <ion-icon name="scan-outline"></ion-icon>
        <p>{{ 'scan_qr_paypal' | translate }}</p>
      </div>
    </section>

    <!-- Description -->
    <section class="glass-panel description-section">
      <div class="desc-icon">
        <ion-icon name="water-outline"></ion-icon>
      </div>
      <p>{{ 'donation_description' | translate }}</p>
    </section>

  </main>

</ion-content>
