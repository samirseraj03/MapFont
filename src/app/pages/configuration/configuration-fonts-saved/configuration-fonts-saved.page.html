<ion-content [fullscreen]="true" class="custom-bg">

  <div class="overlay"></div>

  <header class="glass-header">
    <div class="header-left">
      <button class="back-btn" (click)="NavCtrl.back()">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>
      <h1>{{ 'saved_fountains' | translate }}</h1>
    </div>
    <div class="header-right">
      <ion-icon name="bookmark" class="title-icon"></ion-icon>
    </div>
  </header>

  <main class="main-content">

    <div class="search-container">
      <div class="glass-search-box">
        <ion-icon name="search-outline" class="search-icon"></ion-icon>
        <input type="text" placeholder="Buscar en favoritos..." (input)="SearchElement($event)" class="search-input" />
      </div>
    </div>

    <div class="empty-state" *ngIf="results.length === 0">
      <ion-icon name="water-outline"></ion-icon>
      <p>{{ 'no_saved_fountains' | translate }}</p>
    </div>

    <div class="cards-grid">

      <div class="glass-card" *ngFor="let result of results">

        <div class="card-info" (click)="OnSelect(result)">
          <div class="card-header">
            <div class="icon-box cyan-box">
              <ion-icon name="water"></ion-icon>
            </div>
            <h3>{{ result['matchedWaterSource']['name'] }}</h3>
          </div>

          <div class="card-body">
            <p class="address">
              <ion-icon name="location-outline"></ion-icon>
              {{ result['matchedWaterSource']['address'] || 'Sin dirección registrada' }}
            </p>
            <p class="date">
              <ion-icon name="calendar-outline"></ion-icon>
              Guardado el: {{ GeolocationService.formatDate(result['savedFountain']['created_at']) }}
            </p>
          </div>
        </div>

        <div class="card-actions">
          <button class="action-btn map-btn" (click)="OnSelectNavigate(result)">
            <ion-icon name="navigate-outline"></ion-icon>
            <span>{{ 'go' | translate }}</span>
          </button>

          <button class="action-btn delete-btn" (click)="OnSelectDislike(result)">
            <ion-icon name="heart-dislike-outline"></ion-icon>
            <span>{{ 'remove' | translate }}</span>
          </button>
        </div>

      </div>

    </div>

  </main>
</ion-content>
