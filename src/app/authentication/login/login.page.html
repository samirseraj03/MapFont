<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>{{ 'login' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <div class="card-container">
    <ion-card>
      <ion-row>
        <ion-col size-md="3" size="6" class="ion-padding  w-25">
          <!-- <img 
            src="https://images.prismic.io/ionicframeworkcom/ac68e1d9-9887-4e5a-9820-9290d06638de_ionic+logo+white+on+blue.png"
            alt="Ionic logo"
            loading="lazy"
          /> -->
        </ion-col>
        <ion-col size-md="9" size="12" class="welcome">
          <ion-card-header>
            <ion-card-title> {{ 'welcome_message' | translate }} </ion-card-title>
          </ion-card-header>

          <ion-input [label]="'email_label' | translate" [placeholder]="'email_placeholder' | translate"
            [(ngModel)]="email"></ion-input>
          <ion-input [label]="'password_label' | translate" [placeholder]="'password_placeholder' | translate"
            [(ngModel)]="password"></ion-input>

          <div class="d-flex">
            <ion-card-content>
              <ion-button (click)="login()" shape="round" color="primary"> {{ 'sign_in' | translate }} </ion-button>
            </ion-card-content>

            <ion-card-content>
              <ion-button (click)="GoRegister()" shape="round" color="primary"> {{ 'register' | translate }}
              </ion-button>
            </ion-card-content>
          </div>

        </ion-col>
      </ion-row>
    </ion-card>
  </div>



  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">{{ 'login' | translate }}</ion-title>
    </ion-toolbar>




  </ion-header>
</ion-content>
